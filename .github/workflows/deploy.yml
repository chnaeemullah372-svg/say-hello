name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/say-hello
            git pull origin main
            npm ci
            export NITRO_PRESET=node-server
            npm run build
            pm2 describe say-hello > /dev/null 2>&1 && pm2 restart say-hello || PORT=3000 pm2 start .output/server/index.mjs --name say-hello
            pm2 save
